# Dracula-themed Hyprlock configuration

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.03
    contrast = 0.9
    brightness = 0.7
    color = rgba(40, 42, 54, 1.0)
}

# Time
label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 72
    color = rgba(248, 248, 242, 1.0)
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_family = JetBrainsMono Nerd Font
    font_size = 24
    color = rgba(139, 233, 253, 1.0)
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 120
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text = $USER
    font_family = JetBrainsMono Nerd Font
    font_size = 18
    color = rgba(189, 147, 249, 1.0)
    position = 0, 50
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    position = 0, -50
    halign = center
    valign = center
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(189, 147, 249, 1.0)
    inner_color = rgba(68, 71, 90, 0.8)
    font_color = rgba(248, 248, 242, 1.0)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    rounding = 12
    check_color = rgba(255, 184, 108, 1.0)
    fail_color = rgba(255, 85, 85, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(241, 250, 140, 1.0)
}
