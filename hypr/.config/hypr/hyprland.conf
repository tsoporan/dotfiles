##################################################################################
# HYPRLAND CONFIGURATION - i3-like setup with native dwindle + groups
# Last updated: 2026-03-01
##################################################################################
#
# KEY FEATURES:
# - Dwindle layout with native groups for tabbed containers
# - Vi-style navigation: h/j/k/l
# - Tabbed groups with mod+s, cycle tabs with mod+w
# - Clipboard history with cliphist
#
# ESSENTIAL KEYBINDINGS:
# mod+Enter      = Terminal
# mod+d          = App launcher
# mod+q          = Close window
# mod+h/j/k/l    = Navigate windows
# mod+shift+hjkl = Move windows
# mod+s          = Toggle group (tabbed)
# mod+e          = Toggle split h/v
# mod+w          = Cycle through group tabs
# mod+a          = Maximize window
# mod+1-9        = Workspaces
# mod+p          = Clipboard history
# mod+f          = Fullscreen
# mod+r          = Resize mode
# mod+ctrl+l     = Lock screen
#
##################################################################################

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Auto detect monitor with 1.5x scaling
monitor=,preferred,auto,1.5


###################
### MY PROGRAMS ###
###################

# Application shortcuts - used in keybindings below
$terminal = ghostty                          # Terminal emulator
$menu = wofi --show drun --lines 30         # Application launcher


#################
### AUTOSTART ###
#################

# Authentication agent (polkit - needed for privilege escalation dialogs)
exec-once = systemctl --user start hyprpolkitagent

# Kill stale processes from previous session before starting
exec-once = pkill -x waybar; pkill -x hyprpaper; pkill -x hypridle; pkill -x hyprlock; pkill -x swaync
exec-once = sleep 0.5 && waybar                                # Status bar
exec-once = sleep 0.5 && hyprpaper                             # Wallpaper
exec-once = sleep 0.5 && swaync                                # Notifications
exec-once = sleep 1 && hypridle                                # Idle daemon (after others are up)

# Clipboard history (cliphist handles both selections)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard both                   # Keep alive after app closes

# Fix app launching from wofi
exec-once = dbus-update-activation-environment --all


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Wayland application compatibility
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 2

    border_size = 3

    # Minimal black + electric yellow accent
    col.active_border = rgb(e6fb04)
    col.inactive_border = rgba(202020ff)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#dwindle
dwindle {
    pseudotile = true
    preserve_split = true
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
    # Minimal black + yellow accent for grouped windows
    col.border_active = rgba(e6fb04ff)
    col.border_inactive = rgba(202020ff)
    col.border_locked_active = rgba(e6fb04ff)
    col.border_locked_inactive = rgba(303030ff)

    groupbar {
        enabled = true
        font_family = JetBrainsMono Nerd Font
        font_size = 14
        height = 20
        render_titles = true
        scrolling = true
        gradients = true
        keep_upper_gap = false
        gaps_in = 0
        gaps_out = 0

        # Minimal black - dark tabs, yellow text accent
        col.active = rgba(1a1a1aff) rgba(1a1a1aff)
        col.inactive = rgba(101010ff) rgba(101010ff)
        text_color = rgba(e6fb04ff)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    # rounding = 10
    # rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 0
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = fadeSwitch, 0
}

# Workspace cycling behavior
binds {
    allow_workspace_cycles = true
    movefocus_cycles_groupfirst = true
}

# Per-workspace layouts
workspace = 6, layout:scroll
workspace = 9, layout:dwindle

# Smart gaps - no gaps when only one window
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = match:float false, match:workspace w[tv1], border_size 0, rounding 0
windowrule = match:float false, match:workspace f[1], border_size 0, rounding 0

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}




###################################
### KEYBINDINGS (i3-like setup) ###
###################################

# Main modifier key (Windows/Super key)
$mainMod = SUPER

# === BASIC WINDOW MANAGEMENT ===
bind = $mainMod, Return, exec, $terminal          # Open terminal
bind = $mainMod, q, killactive,                   # Close focused window
bind = $mainMod, d, exec, $menu                   # Application launcher
bind = $mainMod, Tab, exec, wofi --show window --lines 30  # Window switcher
bind = $mainMod SHIFT, Tab, exec, ~/.config/hypr/scripts/show-cheatsheet.sh  # Cheatsheet
bind = $mainMod, f, fullscreen, 0                 # Toggle true fullscreen
bind = $mainMod, Escape, workspace, previous      # Go to previous workspace

# === CLIPBOARD MANAGEMENT ===
bind = $mainMod, p, exec, cliphist list | wofi --dmenu --lines 20 | cliphist decode | wl-copy  # Clipboard history
bind = $mainMod, c, sendshortcut, CTRL+SHIFT, c,  # Copy (sends Ctrl+Shift+C to app)
bind = $mainMod, v, sendshortcut, CTRL+SHIFT, v,  # Paste (sends Ctrl+Shift+V to app)

# === PASSWORD MANAGEMENT ===
bind = $mainMod, T, exec, wofi-pass --copy        # Password manager

# === FLOATING WINDOWS ===
bind = $mainMod SHIFT, space, togglefloating,     # Toggle floating/tiled
bind = $mainMod, space, focuswindow, floating     # Focus floating windows
bind = $mainMod SHIFT, c, centerwindow,           # Center floating window

# === WINDOW RESIZING ===
bind = $mainMod CTRL, h, resizeactive, -50 0      # Shrink width (left)
bind = $mainMod CTRL, j, resizeactive, 0 50       # Grow height (down)
bind = $mainMod CTRL, k, resizeactive, 0 -50      # Shrink height (up)
bind = $mainMod CTRL, l, resizeactive, 50 0       # Grow width (right)

# === LAYOUT SWITCHING (native groups + dwindle) ===
bind = $mainMod, s, togglegroup,                   # Toggle group (tabbed container) on focused window
bind = $mainMod, e, layoutmsg, togglesplit         # Toggle split direction (h/v) in dwindle
bind = $mainMod, w, changegroupactive, f           # Cycle focus forward through group tabs
bind = $mainMod SHIFT, w, changegroupactive, b     # Cycle focus backward through group tabs
bind = $mainMod, a, fullscreen, 1                  # Maximize window (keeps bar visible)
bind = $mainMod SHIFT, a, fullscreen, 0            # True fullscreen toggle

# === APPLICATIONS ===
bind = $mainMod SHIFT, g, exec, lutris             # Launch Lutris (gaming)

# === NOTIFICATIONS (SwayNC) ===
bind = $mainMod, n, exec, swaync-client -t -sw     # Toggle notification center
bind = $mainMod SHIFT, n, exec, swaync-client -d -sw # Toggle Do Not Disturb

# === SCRATCHPAD (dropdown terminal-like workspace) ===
bind = $mainMod, minus, togglespecialworkspace, scratchpad       # Toggle scratchpad visibility
bind = $mainMod SHIFT, minus, movetoworkspace, special:scratchpad # Move window to scratchpad

# === SYSTEM CONTROLS ===
bind = $mainMod SHIFT, r, exec, hyprctl reload     # Reload Hyprland config
bind = $mainMod CTRL, l, exec, pidof hyprlock || hyprlock  # Manual screen lock (Ctrl, not Shift - conflict with move)
bind = $mainMod SHIFT, e, exit,                    # Exit Hyprland

# === SCREENSHOTS ===
bind = $mainMod SHIFT, s, exec, grim -g "$(slurp)" - | wl-copy  # Area screenshot to clipboard
bind = $mainMod SHIFT, x, exec, grim -g "$(slurp)" - | satty -f -  # Area screenshot to satty (annotate/save)
bind = , Print, exec, grim - | satty -f -  # Fullscreen screenshot to satty

# === WINDOW FOCUS (native movefocus) ===
# Arrow keys
bind = $mainMod, left, movefocus, l                # Focus left
bind = $mainMod, right, movefocus, r               # Focus right
bind = $mainMod, up, movefocus, u                  # Focus up
bind = $mainMod, down, movefocus, d                # Focus down
# Vi-style keys (h/j/k/l)
bind = $mainMod, h, movefocus, l                   # Focus left
bind = $mainMod, j, movefocus, d                   # Focus down
bind = $mainMod, k, movefocus, u                   # Focus up
bind = $mainMod, l, movefocus, r                   # Focus right

# === WORKSPACE SWITCHING ===
bind = $mainMod, 1, workspace, 1                  # Switch to workspace 1
bind = $mainMod, 2, workspace, 2                  # Switch to workspace 2
bind = $mainMod, 3, workspace, 3                  # Switch to workspace 3
bind = $mainMod, 4, workspace, 4                  # Switch to workspace 4
bind = $mainMod, 5, workspace, 5                  # Switch to workspace 5
bind = $mainMod, 6, workspace, 6                  # Switch to workspace 6
bind = $mainMod, 7, workspace, 7                  # Switch to workspace 7
bind = $mainMod, 8, workspace, 8                  # Switch to workspace 8
bind = $mainMod, 9, workspace, 9                  # Switch to workspace 9
bind = $mainMod, 0, workspace, 10                 # Switch to workspace 10

# === MOVE WINDOW TO WORKSPACE ===
bind = $mainMod SHIFT, 1, movetoworkspace, 1      # Move window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2      # Move window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3      # Move window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4      # Move window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5      # Move window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6      # Move window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7      # Move window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8      # Move window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9      # Move window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10     # Move window to workspace 10

# === MOVE WINDOWS (movewindoworgroup moves into/out of groups automatically) ===
# Vi-style keys with shift (h/j/k/l)
bind = $mainMod SHIFT, h, movewindoworgroup, l    # Move window left (into/out of groups)
bind = $mainMod SHIFT, j, movewindoworgroup, d    # Move window down
bind = $mainMod SHIFT, k, movewindoworgroup, u    # Move window up
bind = $mainMod SHIFT, l, movewindoworgroup, r    # Move window right
# Arrow keys with shift
bind = $mainMod SHIFT, left, movewindoworgroup, l  # Move window left
bind = $mainMod SHIFT, down, movewindoworgroup, d  # Move window down
bind = $mainMod SHIFT, up, movewindoworgroup, u    # Move window up
bind = $mainMod SHIFT, right, movewindoworgroup, r # Move window right

# Resize mode (submap)
bind = $mainMod, r, submap, resize
submap = resize
bind = , h, resizeactive, -10 0
bind = , j, resizeactive, 0 10
bind = , k, resizeactive, 0 -10
bind = , l, resizeactive, 10 0
bind = , left, resizeactive, -10 0
bind = , down, resizeactive, 0 10
bind = , up, resizeactive, 0 -10
bind = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , escape, submap, reset
submap = reset

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Floating window rules - make specific apps always float and center
windowrule = match:class ^(pavucontrol)$, float on, center on, size 800 600
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:title ^(File Operation Progress)$, float on, center on

# Calculator, system monitors, etc.
windowrule = match:class ^(gnome-calculator)$, float on, center on, size 400 600

# Cheatsheet popup floats in center for readability
windowrule = match:class ^(HyprCheatsheet)$, float on, center on

# Calendar popup
windowrule = match:class ^(calendar-popup)$, float on, center on, size 650 250

# Ignore maximize requests from apps
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on
