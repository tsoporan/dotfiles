# ==============================================================================
# Starship Prompt Configuration
# Last updated: 2025-12-26
# ==============================================================================
#
# Docs: https://starship.rs/config/
# Performance-focused config with Dracula-inspired colors
#
# ==============================================================================

# Don't add blank line between prompts
add_newline = false

# Timeout for commands (ms)
command_timeout = 500

# ------------------------------------------------------------------------------
# Prompt Format
# ------------------------------------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$python\
$bun\
$nodejs\
$rust\
$golang\
$terraform\
$aws\
$cmd_duration\
$line_break\
$character"""

# ------------------------------------------------------------------------------
# Directory
# ------------------------------------------------------------------------------
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"
read_only_style = "red"

# ------------------------------------------------------------------------------
# Git
# ------------------------------------------------------------------------------
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰏗"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# ------------------------------------------------------------------------------
# Languages (only show when relevant files detected)
# ------------------------------------------------------------------------------
[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "󰌠 "
style = "yellow"

[bun]
format = "[$symbol($version )]($style)"
symbol = "🥟 "
style = "bold #fbf0df"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = "󰎙 "
style = "green"

[rust]
format = "[$symbol($version )]($style)"
symbol = "󱘗 "
style = "red"

[golang]
format = "[$symbol($version )]($style)"
symbol = "󰟓 "
style = "cyan"

# ------------------------------------------------------------------------------
# Command Duration
# ------------------------------------------------------------------------------
[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"
show_milliseconds = false

# ------------------------------------------------------------------------------
# Prompt Character
# ------------------------------------------------------------------------------
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_visual_symbol = "[❮](bold yellow)"

# ------------------------------------------------------------------------------
# Disabled Modules (for faster prompt)
# ------------------------------------------------------------------------------
[aws]
format = '[$symbol($profile )(\($region\) )]($style)'
symbol = "󰸏 "
style = "bold #ff9900"

[azure]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[package]
disabled = true

[terraform]
format = '[$symbol$workspace]($style) '
symbol = "󱁢 "
style = "bold #844fba"

[vagrant]
disabled = true

[nix_shell]
disabled = true

[memory_usage]
disabled = true

[battery]
disabled = true

[time]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
